<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ViaMontana</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQd6dfX4b8QBCGCmGCqMCVXRuA2nS0M="
      crossorigin=""
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="planner-panel" aria-label="Route search">
        <div class="brand-block">
          <img class="brand-logo" src="/media/logo.png" alt="ViaMontana logo" />
          <div class="brand-copy">
            <p class="eyebrow">ViaMontana</p>
            <h1>Plan hut-to-hut days from precomputed Swiss trail routes.</h1>
          </div>
        </div>

        <form id="search-form" class="controls">
          <label>
            <span>Starting hut</span>
            <input
              id="start-hut"
              name="start_hut"
              type="search"
              list="hut-options"
              autocomplete="off"
              required
              placeholder="Type a hut name"
            />
            <datalist id="hut-options"></datalist>
          </label>

          <label>
            <span>Days</span>
            <input id="days" name="days" type="number" min="1" max="10" value="3" />
          </label>

          <fieldset>
            <legend>Hiking time per day</legend>
            <div class="control-grid">
              <label>
                <span>Min hours</span>
                <input id="min-duration" name="min_duration_h" type="number" min="0" step="0.25" value="2" />
              </label>
              <label>
                <span>Max hours</span>
                <input id="max-duration" name="max_duration_h" type="number" min="0" step="0.25" value="8" />
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>Elevation change per day</legend>
            <div class="control-grid">
              <label>
                <span>Min meters</span>
                <input id="min-elevation" name="min_elevation_change_m" type="number" min="0" step="50" value="0" />
              </label>
              <label>
                <span>Max meters</span>
                <input id="max-elevation" name="max_elevation_change_m" type="number" min="0" step="50" value="2400" />
              </label>
            </div>
          </fieldset>

          <button type="submit">Search routes</button>
        </form>
      </section>

      <div class="workspace">
        <aside class="results-panel" aria-live="polite">
          <div class="results-header">
            <div>
              <p class="eyebrow">Matches</p>
              <h2 id="results-title">No search yet</h2>
            </div>
            <p id="status-text" class="status-text">Enter a hut and route constraints.</p>
          </div>
          <div id="results" class="results-list"></div>
        </aside>

        <section class="map-panel">
          <fieldset class="map-source-toggle" aria-label="Map source">
            <legend>Map</legend>
            <label>
              <input type="radio" name="map_source" value="swisstopo" checked />
              <span>Swisstopo</span>
            </label>
            <label>
              <input type="radio" name="map_source" value="osm" />
              <span>OpenStreetMap</span>
            </label>
          </fieldset>
          <div id="map" class="route-map" aria-label="Route map"></div>
        </section>
      </div>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/static/app.js?v=2" type="module"></script>
  </body>
</html>
